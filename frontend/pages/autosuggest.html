<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .left-bar{
            position: fixed;
            top: 20px;
            left: 20px;
        }
        .right-bar{
            position: fixed;
            top: 20px;
            right: 20px;
        }
        .search-section{
            text-align: center;
            margin-top: 100px;
        }
        .logo-first{
            color: blue;
        }
        .tag-line{
            color: gray;
        }
        .lens{ 
            position: relative;
             /* left or right or top or bottom  */
             left: 35px; 
        }
        .search-box{
            padding: 15px 15px 15px 45px; 
            border-radius: 30px; 
            width: 40%;
        }
        #suggestion-box{
            /* border: 1px solid black; */
            width : 45%;
            margin-left: 29%;
        }
        #suggestion-item{
            border: 1px solid gray;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div>
        <span class="left-bar" >&#9881;</span>
        <span class="right-bar" >&#x2022; online | &#x1F552; - ms</span>
    </div>
    <div class="search-section">
        <h1><span class="logo-first">Being</span> Infinity</h1>
        <p class="tag-line">One million phrases. Four Algorithms. Prefix Based Auto Suggest</p>
        <span> 
            <span class="lens">&#128269;</span> 
            <input class="search-box" id="search-box" placeholder="Start Typing to search">
        </span>
        <div id="suggestion-box">
            <!-- Suggestion Box -->
        </div>
    </div>

    <script>
        var searchBox = document.getElementById("search-box");
        var suggestionBox = document.getElementById("suggestion-box");

        searchBox.addEventListener("input", function(){
            // complete 1, 2 - 5 MINS
            // 1 : Get user typed text
            var userInput = searchBox.value;
            if(userInput.trim() === ""){

            }
            else{
                var url1 = "https://autosuggest-backend.onrender.com/api/autosuggest?q=";
                var url3 = "&algorithm=brute&limit=10&weighted=false";
                var url = url1 + userInput + url3;
                // 2 : Make api call to get suggestion 
                fetch(url).
                    then(function(response){
                        return response.json();
                    })
                    .then(function(data){
                        console.log(data);

                        // 3 : Display data in HTML
                        var resultsArray = data.results;
                        var htmlResults = "";
                        for(var i=0; i< resultsArray.length; i++)
                        {
                            htmlResults+= "<div id='suggestion-item'>" + resultsArray[i].text + "</div>"
                        }
                        // var suggestionBox = document.getElementById("suggestion-box");
                        suggestionBox.innerHTML = htmlResults;
                        
                    })

                
            }


        })
    </script>
</body>
</html>
